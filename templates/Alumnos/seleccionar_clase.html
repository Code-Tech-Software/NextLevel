<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selecciona tu Clase - Lobby</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #f4f7f6;
            --primary-color: #4361ee;
            --accent-color: #f72585;
            --secondary-accent: #4cc9f0;
            --card-border: #e2e8f0;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(#cbd5e1 1.5px, transparent 1.5px);
            background-size: 30px 30px;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }

        /* --- Título Principal --- */
        .lobby-title {
            font-weight: 900;
            font-size: 3.5rem;
            color: #1e293b;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 4px 4px 0px white, 6px 6px 0px rgba(0,0,0,0.05);
            margin-bottom: 1rem;
        }

        .lobby-subtitle {
            font-weight: 800;
            color: var(--primary-color);
            font-size: 1.2rem;
            background: white;
            padding: 10px 30px;
            border-radius: 50px;
            display: inline-block;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 3rem;
        }

        /* --- Tarjetas de Clase (Mundos) --- */
        .class-card {
            background: white;
            border-radius: 28px;
            border: 4px solid var(--card-border);
            text-decoration: none;
            color: inherit;
            display: block;
            position: relative;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            overflow: hidden;
            z-index: 1;
            padding-bottom: 20px;
        }

        .class-card:hover {
            transform: translateY(-10px);
            border-color: var(--secondary-accent);
            box-shadow: 0 20px 40px rgba(76, 201, 240, 0.2);
            color: inherit;
        }

        /* Efecto de olas en el fondo de la tarjeta */
        .card-wave {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 120px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-accent));
            border-radius: 24px 24px 40px 40px;
            z-index: -1;
            transition: height 0.3s ease;
        }

        .class-card:hover .card-wave {
            height: 140px;
        }

        /* Ícono flotante */
        .class-icon-container {
            width: 90px;
            height: 90px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 30px auto 15px auto;
            font-size: 3rem;
            color: var(--accent-color);
            border: 5px solid white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }

        .class-card:hover .class-icon-container {
            transform: scale(1.1) rotate(5deg);
        }

        /* Textos de la tarjeta */
        .grade-badge {
            background: #f1f5f9;
            color: #475569;
            font-weight: 900;
            padding: 8px 20px;
            border-radius: 12px;
            display: inline-block;
            font-size: 1.1rem;
            letter-spacing: 1px;
            margin-bottom: 15px;
            border: 2px dashed #cbd5e1;
        }

        .class-name {
            font-weight: 900;
            color: #1e293b;
            font-size: 1.8rem;
            margin-bottom: 20px;
        }

        /* Botón de entrar */
        .btn-enter-world {
            background: var(--primary-color);
            color: white;
            font-weight: 900;
            font-size: 1.1rem;
            text-transform: uppercase;
            border-radius: 16px;
            padding: 12px 30px;
            display: inline-block;
            border: none;
            box-shadow: 0 6px 0 #314bce;
            transition: all 0.1s;
        }

        .class-card:hover .btn-enter-world {
            background: var(--accent-color);
            box-shadow: 0 6px 0 #b5179e;
        }

        .class-card:active .btn-enter-world {
            transform: translateY(6px);
            box-shadow: 0 0px 0 #b5179e;
        }

    </style>
</head>
<body>

<div class="container py-5 text-center">
    
    <h1 class="lobby-title">¡Bienvenido!</h1>
    <div class="lobby-subtitle">
        <i class="bi bi-geo-alt-fill me-2"></i> ¿A qué clase vas a entrar hoy?
    </div>

    <div class="row g-4 justify-content-center">
        {% for clase in clases %}
            <div class="col-12 col-md-6 col-lg-4">
                <a href="{% url 'lista_alumnos' clase.id %}" class="class-card">
                    <div class="card-wave"></div>
                    
                    <div class="class-icon-container">
                        <i class="bi bi-rocket-takeoff-fill"></i>
                    </div>

                    <div class="px-4">
                        <div class="grade-badge">
                            {{ clase.grado }} {{ clase.grupo }}
                        </div>
                        <h2 class="class-name">{{ clase.nombre }}</h2>
                        
                        <div class="btn-enter-world">
                            Entrar <i class="bi bi-arrow-right-circle-fill ms-1"></i>
                        </div>
                    </div>
                </a>
            </div>
        {% empty %}
            <div class="col-12">
                <div class="bg-white rounded-4 p-5 shadow-sm d-inline-block border border-2 border-light">
                    <i class="bi bi-moon-stars-fill text-muted" style="font-size: 4rem;"></i>
                    <h3 class="fw-bold mt-4 text-secondary">Aún no hay clases creadas</h3>
                    <p class="text-muted fs-5">Pídele a tu maestro que active un nuevo mundo.</p>
                </div>
            </div>
        {% endfor %}
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
