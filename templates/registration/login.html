<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Profesores</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background-color: #f4f7f6;
            background-image: radial-gradient(#cbd5e1 1.5px, transparent 1.5px);
            background-size: 30px 30px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: white;
            border-radius: 28px;
            border: 4px solid #e2e8f0;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            padding: 40px;
            width: 100%;
            max-width: 450px;
            position: relative;
            overflow: hidden;
        }
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .login-icon {
            font-size: 3.5rem;
            color: #4361ee;
            margin-bottom: 10px;
        }
        .login-title {
            font-weight: 900;
            color: #1e293b;
            font-size: 2rem;
        }
        .form-control {
            border-radius: 12px;
            padding: 12px 20px;
            border: 2px solid #e2e8f0;
            font-weight: 600;
        }
        .form-control:focus {
            border-color: #4cc9f0;
            box-shadow: 0 0 0 0.25rem rgba(76, 201, 240, 0.25);
        }
        .btn-login {
            background: #4361ee;
            color: white;
            font-weight: 900;
            font-size: 1.2rem;
            text-transform: uppercase;
            border-radius: 16px;
            padding: 12px;
            width: 100%;
            border: none;
            box-shadow: 0 6px 0 #314bce;
            margin-top: 20px;
            transition: all 0.1s;
        }
 .btn-login:hover {
    background: #314bce; 
    box-shadow: 0 6px 0 #23399e; 
    color: white;
}
.btn-login:active {
    transform: translateY(6px);
    box-shadow: 0 0px 0 #23399e; 
}
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="login-card">
            <div class="login-header">
                <i class="bi bi-shield-lock-fill login-icon"></i>
                <h2 class="login-title">Profesor</h2>
            </div>
            
            <form method="post">
                {% csrf_token %}
                <div class="mb-4">
                    <label for="id_username" class="form-label fw-bold text-secondary">Usuario</label>
                    <input type="text" name="username" class="form-control" id="id_username" required autofocus>
                </div>
                <div class="mb-4">
                    <label for="id_password" class="form-label fw-bold text-secondary">Contraseña</label>
                    <input type="password" name="password" class="form-control" id="id_password" required>
                </div>
                <button type="submit" class="btn-login">Ingresar al Dashboard</button>
            </form>
            
            <div class="text-center mt-4">
                <a href="/" class="text-muted fw-bold text-decoration-none">
                    <i class="bi bi-arrow-left"></i> Volver al Lobby
                </a>
            </div>
        </div>
    </div>
</div>

</body>
</html>
