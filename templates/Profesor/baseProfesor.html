<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Centro de Mando Next-Level{% endblock %}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>

        :root {
            --bg-color: #f4f6f9;
            --surface-color: #ffffff;
            --primary-game: #6366f1; /* Índigo vibrante */
            --epic-purple: #8b5cf6;
            --secondary-game: #ec4899; /* Rosa neón apagado */
            --accent-gold: #f59e0b; /* Dorado */
            --success-game: #10b981; /* Verde victoria */
            --danger-game: #ef4444; /* Rojo derrota */
            --text-main: #1e293b;
            --text-muted: #64748b;
        }
        
        
        .text-morado {
            color: var(--epic-purple);
        }

        .text-dorado {
            color: var(--accent-gold);
        }

        .text-verde {
            color: var(--success-game);
        }


        .text-rosa {
            color: var(--secondary-game);
        }

        .text-indigo {
            color: var(--primary-game);
        }

        

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            background-image: radial-gradient(#cbd5e1 1.5px, transparent 1.5px);
            background-size: 30px 30px;
        }

        /* --- ESTILOS EXCLUSIVOS DE LA BARRA DE NAVEGACIÓN --- */
        .hud-navbar {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .brand-text {
            color: var(--text-main);
            font-weight: 700;
            letter-spacing: -0.5px;
        }


        .dropdown-toggle::after {
            display: none;
        }

        .profile-avatar {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .dropdown-toggle:hover .profile-avatar {
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .btn-logout {
            color: #ef4444;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .btn-logout:hover {
            background-color: rgba(239, 68, 68, 0.1);
            color: #ef4444;
        }
    </style>

    {% block extra_css %}{% endblock %}
</head>
<body>

<nav class="navbar hud-navbar mb-4 py-3">
    <div class="container">
        
        <span class="navbar-brand mb-0 h1 d-flex align-items-center">
            <i class="bi bi-controller text-dark fs-4 me-2"></i> 
            <span class="brand-text">Next-Level <span class="text-muted fw-normal fs-6 ms-1">by Mr. David</span></span>
        </span>

        <div class="d-flex align-items-center">

            {% url 'dashboard_profesor' as url_dashboard %}
            {% if request.path != url_dashboard %}
                <a href="{{ url_dashboard }}" class="btn btn-outline-dark btn-sm me-3 d-flex align-items-center"
                   style="border-radius: 8px; font-weight: 600;">
                    <i class="bi bi-arrow-left me-2"></i> Volver
                </a>
            {% endif %}
            <div class="level-badge border-0 bg-dark text-white me-3 d-none d-md-block"
                 style="border-radius: 8px; padding: 4px 10px; font-weight: 600; font-size: 0.85rem;">
                <i class="bi bi-person-fill-gear me-1"></i> Admin Panel
            </div>

            <div class="dropdown">
                <a href="#" class="d-block text-decoration-none dropdown-toggle" id="dropdownUser1"
                   data-bs-toggle="dropdown" aria-expanded="false">
                    <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Admin" alt="Admin" width="40" height="40"
                         class="rounded-circle bg-light border border-2 border-secondary profile-avatar">
                </a>
                <ul class="dropdown-menu dropdown-menu-end shadow-sm border-0 mt-2 p-2" aria-labelledby="dropdownUser1">
                    <li>
                        <form method="post" action="{% url 'logout' %}">
                            {% csrf_token %}
                            <button type="submit" class="dropdown-item btn-logout rounded">
                                <i class="bi bi-box-arrow-right me-2"></i>Cerrar Sesión
                            </button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </div>
</nav>

{% block content %}
{% endblock %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
{% include 'includes/alertas.html' %}
</body>
</html>
